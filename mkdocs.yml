site_name: KernelBox
site_description: Lightweight IPython kernel management for agents.
site_author: KernelBox maintainers

theme:
  name: material
  language: en
  favicon: assets/logo.svg
  palette:
    - scheme: default
      primary: black
      accent: grey
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: grey
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - About: about.md
  - Market Landscape: market_landscape.md
  - Getting Started:
      - Prerequisites: requirements.md
      - Setup: setup.md
      - Configuration: configuration.md
      - Running KernelBox: run.md
  - Usage & Tutorials:
      - Examples: examples.md
      - Python API: tutorials/python-api.md
      - HTTP API: tutorials/http-api.md
      - CLI: tutorials/cli.md
  - Advanced:
      - Security Overview: security.md
      - Developer Guide: dev_guide.md
  - Reference:
      - Version: version.md

plugins:
  - search

markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  version:
    provider: mike
    default: "0.1.0"

extra_css:
  - stylesheets/extra.css

